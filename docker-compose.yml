services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
    restart: unless-stopped

  dashboard:
    build: .
    expose:
      - "80"
    env_file:
      - backend/.env
    environment:
      - DATA_DIR=/app/data
    volumes:
      - cache_data:/app/data
    restart: unless-stopped

volumes:
  cache_data:
  caddy_data:
  caddy_config:
