services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
    restart: unless-stopped

  dashboard:
    build: .
    expose:
      - "80"
    env_file:
      - backend/.env
    environment:
      - DATA_DIR=/app/data
      - KB_ARTICLE_ARCHIVE=/app/private/OIT_KB_Articles.zip
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - cache_data:/app/data
      - ./private:/app/private:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  cache_data:
  caddy_data:
  caddy_config:
