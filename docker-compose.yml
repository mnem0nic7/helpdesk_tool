x-backend-common: &backend-common
  build:
    context: .
    dockerfile: Dockerfile.backend
  expose:
    - "8000"
  env_file:
    - backend/.env
  environment: &backend-env
    DATA_DIR: /app/data
    DATABASE_URL: postgresql://altlassian:altlassian@postgres:5432/altlassian
    REDIS_URL: redis://redis:6379/0
    REDIS_NAMESPACE: altlassian
    STORAGE_DUAL_WRITE_SQLITE: "1"
    KB_ARTICLE_ARCHIVE: /app/private/OIT_KB_Articles.zip
    OLLAMA_BASE_URL: http://host.docker.internal:11434
    OLLAMA_SECURITY_ENABLED: "1"
    OLLAMA_SECURITY_BASE_URL: http://security_ollama:11434
    OLLAMA_SECURITY_MODEL: qwen3.5:4b
    APP_RUNTIME_BLUEGREEN_ENABLED: "1"
  volumes:
    - cache_data:/app/data
    - ./private:/app/private:ro
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - app_net
  restart: unless-stopped

x-frontend-common: &frontend-common
  build:
    context: .
    dockerfile: Dockerfile.frontend
  expose:
    - "80"
  networks:
    - app_net
  restart: unless-stopped

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: altlassian
      POSTGRES_USER: altlassian
      POSTGRES_PASSWORD: altlassian
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U altlassian -d altlassian"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - app_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - app_net
    restart: unless-stopped

  security_ollama:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "/scripts/security_ollama_entrypoint.sh"]
    environment:
      SECURITY_OLLAMA_PRIMARY_MODEL: qwen3.5:4b
      SECURITY_OLLAMA_FALLBACK_MODEL: nemotron-3-nano:4b
    expose:
      - "11434"
    volumes:
      - ollama_security_data:/root/.ollama
      - ./scripts/security_ollama_entrypoint.sh:/scripts/security_ollama_entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "[ -f /tmp/security-ollama-ready ] && OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 5s
    networks:
      - app_net
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    networks:
      - app_net
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.deploy-state/active_upstreams.caddy:/etc/caddy/active_upstreams.caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  backend_blue:
    <<: *backend-common
    environment:
      <<: *backend-env
      APP_RUNTIME_COLOR: blue
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      security_ollama:
        condition: service_healthy

  backend_green:
    <<: *backend-common
    environment:
      <<: *backend-env
      APP_RUNTIME_COLOR: green
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      security_ollama:
        condition: service_healthy

  frontend_blue:
    <<: *frontend-common

  frontend_green:
    <<: *frontend-common

networks:
  app_net:

volumes:
  cache_data:
  caddy_data:
  caddy_config:
  ollama_security_data:
  postgres_data:
  redis_data:
